<%+cbi/valueheader%>
<div class="ag-log-page">

	<div class="ag-log-toolbar">
		<div class="ag-log-controls">
			<label class="ag-log-ctrl">
				<input type="checkbox" id="ag-log-rev" checked onclick="agLogRev()">
				<span><%:Reverse Order%></span>
			</label>
			<%if self.timereplace then%>
			<label class="ag-log-ctrl">
				<input type="checkbox" id="ag-log-local" checked onclick="agLogTime()">
				<span><%:Local Time%></span>
			</label>
			<%end%>
		</div>
		<div class="ag-log-actions">
			<button type="button" class="ag-btn ag-btn-outline ag-btn-sm" onclick="agLogDown()">
				<svg class="ag-btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" focusable="false" style="width:16px;height:16px;max-width:16px;max-height:16px;flex-shrink:0"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM17 13l-5 5-5-5h3V9h4v4h3z"/></svg>
				<span><%:Download%></span>
			</button>
			<button type="button" class="ag-btn ag-btn-danger ag-btn-sm" onclick="agLogClear()">
				<svg class="ag-btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" focusable="false" style="width:16px;height:16px;max-width:16px;max-height:16px;flex-shrink:0"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
				<span><%:Clear Log%></span>
			</button>
		</div>
	</div>

	<div class="ag-log-view">
		<textarea id="ag-log-ta" class="ag-log-ta" rows="30" readonly></textarea>
	</div>

</div>

<style>
.ag-log-page {
	display: flex;
	flex-direction: column;
	gap: 12px;
}

.ag-log-toolbar {
	display: flex;
	align-items: center;
	justify-content: space-between;
	padding: 12px 16px;
	border-radius: 10px;
	background: var(--ag-card-bg, #fff);
	border: 1px solid rgba(0,0,0,.06);
	flex-wrap: wrap;
	gap: 10px;
}

.ag-log-controls, .ag-log-actions {
	display: flex;
	align-items: center;
	gap: 10px;
}

.ag-log-ctrl {
	display: flex;
	align-items: center;
	gap: 5px;
	font-size: 13px;
	color: var(--ag-text-secondary, #86868b);
	cursor: pointer;
}

.ag-log-ctrl input { accent-color: #007AFF; }

.ag-log-view {
	border-radius: 10px;
	overflow: hidden;
	background: var(--ag-card-bg, #fff);
	border: 1px solid rgba(0,0,0,.06);
}

.ag-log-ta {
	display: block;
	width: 100%;
	box-sizing: border-box;
	border: none;
	background: transparent;
	font-family: 'SF Mono', Monaco, 'Courier New', monospace;
	font-size: 12px;
	line-height: 1.6;
	color: var(--ag-text-primary, #1d1d1f);
	padding: 14px;
	resize: none;
	outline: none;
}

.ag-btn {
	display: inline-flex;
	align-items: center;
	justify-content: center;
	gap: 5px;
	padding: 8px 14px;
	border: none;
	border-radius: 8px;
	font-size: 13px;
	font-weight: 500;
	cursor: pointer;
	transition: opacity .2s;
	white-space: nowrap;
}

.ag-btn-icon {
	width: 16px !important;
	height: 16px !important;
	min-width: 16px;
	min-height: 16px;
	flex-shrink: 0;
}

.ag-btn-sm { padding: 6px 12px; font-size: 12px; }

.ag-btn-outline {
	background: transparent;
	border: 1px solid rgba(0,0,0,.12);
	color: var(--ag-text-primary, #1d1d1f);
}

.ag-btn-outline:hover { background: rgba(0,0,0,.03); }

.ag-btn-danger {
	background: rgba(255,59,48,.1);
	color: #FF3B30;
}
</style>

<script type="text/javascript">
//<![CDATA[
(function () {
	var ta = document.getElementById('ag-log-ta');
	var isRev = true;
	var isLocal = <%=tostring(self.timereplace)%>;

	function pad2(s) { return s < 10 ? '0' + s : s; }

	function lineToLocal(str) {
		var out = [];
		str.trim().split('\n').forEach(function (v) {
			var dt = new Date(v.substring(0,19) + ' UTC');
			if (dt != 'Invalid Date') {
				out.push(dt.getFullYear() + '/' + pad2(dt.getMonth()+1) + '/' + pad2(dt.getDate())
					+ ' ' + pad2(dt.getHours()) + ':' + pad2(dt.getMinutes()) + ':' + pad2(dt.getSeconds())
					+ v.substring(19));
			} else {
				out.push(v);
			}
		});
		return out;
	}

	function lineToUTC(str) {
		var out = [];
		str.trim().split('\n').forEach(function (v) {
			var dt = new Date(v.substring(0,19));
			if (dt != 'Invalid Date') {
				out.push(pad2(dt.getUTCMonth()+1) + '/' + pad2(dt.getUTCDate())
					+ ' ' + pad2(dt.getUTCHours()) + ':' + pad2(dt.getUTCMinutes()) + ':' + pad2(dt.getUTCSeconds())
					+ v.substring(19));
			} else {
				out.push(v);
			}
		});
		return out;
	}

	function revLines() {
		if (!ta) return;
		var lines = ta.value.split('\n').filter(function(l){return l.length>0;});
		ta.value = lines.reverse().join('\n');
	}

	window.agLogRev = function () {
		isRev = !isRev;
		revLines();
	};

	window.agLogTime = function () {
		if (!ta) return;
		var lines;
		if (isLocal) {
			lines = lineToUTC(ta.value);
			isLocal = false;
		} else {
			lines = lineToLocal(ta.value);
			isLocal = true;
		}
		ta.value = isRev ? lines.reverse().join('\n') : lines.join('\n');
	};

	window.agLogDown = function () {
		if (!ta || !ta.value) return;
		var a = document.createElement('a');
		var dt = new Date();
		var ts = (dt.getMonth()+1) + '-' + dt.getDate() + '-' + dt.getHours() + '_' + dt.getMinutes();
		a.download = 'AdGuardHome_' + ts + '.log';
		a.href = URL.createObjectURL(new Blob([ta.value], {type:'text/plain'}));
		a.click();
		URL.revokeObjectURL(a.href);
	};

	window.agLogClear = function () {
		if (!confirm('<%:Are you sure you want to clear the log?%>')) return;
		XHR.get('<%=url([[admin]],[[services]],[[AdGuardHome]],[[dodellog]])%>', null, function () {
			if (ta) ta.value = '';
		});
	};

	<%if self.pollcheck then%>
	XHR.poll(3, '<%=url([[admin]],[[services]],[[AdGuardHome]],[[getlog]])%>', null,
		function (x) {
			if (!ta || !x || !x.responseText) return;
			var lines;
			if (isLocal) {
				lines = lineToLocal(x.responseText);
			} else {
				lines = x.responseText.split('\n');
			}
			var chunk = (isRev ? lines.reverse().join('\n') + '\n' : '\n' + lines.join('\n'));
			ta.value = isRev ? chunk + ta.value : ta.value + chunk;
			ta.scrollTop = isRev ? 0 : ta.scrollHeight;
		}
	);
	<%else%>
	if (ta) ta.value = '<%:No log available%>';
	<%end%>
})();
//]]>
</script>
<%+cbi/valuefooter%>
