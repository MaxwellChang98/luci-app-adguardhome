<script type="text/javascript">//<![CDATA[
(function () {
	var cleanupFrame = 0;

	function clearThemeServiceDecorations(root) {
		var scope = root || document;
		var serviceClasses = [
			"apple-service-action-cell",
			"apple-service-action-value",
			"apple-service-button",
			"apple-service-button-row",
			"apple-service-compact-button",
			"apple-service-icon-button",
			"apple-service-icon-media",
			"apple-service-multi-action-value",
			"apple-service-normal-button",
			"apple-service-primary-button",
			"apple-service-single-action",
			"apple-service-wide-button"
		];
		var selector = serviceClasses.map(function (name) {
			return "." + name;
		}).join(",");
		var nodes = selector ? scope.querySelectorAll(selector) : [];

		for (var i = 0; i < nodes.length; i++) {
			for (var j = 0; j < serviceClasses.length; j++) {
				nodes[i].classList.remove(serviceClasses[j]);
			}
		}
	}

	function scheduleThemeCleanup(root) {
		if (cleanupFrame) {
			return;
		}

		cleanupFrame = window.requestAnimationFrame(function () {
			cleanupFrame = 0;
			clearThemeServiceDecorations(root);
		});
	}

	function resetSectionRole(section) {
		var classes = [];

		section.classList.remove("ag-status-section", "ag-settings-section");
		for (var i = 0; i < section.classList.length; i++) {
			if (section.classList[i].indexOf("ag-section-") === 0) {
				classes.push(section.classList[i]);
			}
		}
		for (var j = 0; j < classes.length; j++) {
			section.classList.remove(classes[j]);
		}
		section.removeAttribute("data-ag-section");
	}

	function normalizeOptionGrids(map) {
		var optionRows = [
			"cbi-AdGuardHome-AdGuardHome-upprotect",
			"cbi-AdGuardHome-AdGuardHome-backupfile",
			"cbi-AdGuardHome-AdGuardHome-crontab"
		];

		for (var i = 0; i < optionRows.length; i++) {
			var row = map.querySelector("#" + optionRows[i]);
			var host = row ? row.querySelector(".cbi-value-field > .cbi-checkbox, .cbi-value-field > .cbi-radio, .cbi-value-field > div") : null;

			if (!host) {
				continue;
			}

			for (var j = host.childNodes.length - 1; j >= 0; j--) {
				var child = host.childNodes[j];

				if (child.nodeType === 3 && child.textContent.replace(/\u00a0/g, "").trim() === "") {
					host.removeChild(child);
				} else if (child.nodeType === 1 && child.tagName === "BR") {
					host.removeChild(child);
				}
			}
		}
	}

	function markPage() {
		var map = document.querySelector(".cbi-map");
		if (map) {
			map.classList.add("adguardhome-luci-page");
			var sections = [];
			var sectionNames = ["essentials", "core-files", "rules-access", "maintenance", "downloads"];
			for (var i = 0; i < map.children.length; i++) {
				var node = map.children[i];
				if ((" " + node.className + " ").indexOf(" cbi-section ") >= 0) {
					sections.push(node);
				}
			}
			for (var k = 0; k < map.children.length; k++) {
				if ((" " + map.children[k].className + " ").indexOf(" ag-status-bar ") >= 0) {
					map.children[k].classList.add("ag-status-section");
				}
			}
			for (var j = 0, sectionIndex = 0; j < sections.length; j++) {
				resetSectionRole(sections[j]);
				if (sections[j].querySelector(".ag-status-bar")) {
					sections[j].classList.add("ag-status-section");
				} else {
					var name = sectionNames[sectionIndex] || ("section-" + sectionIndex);
					sections[j].classList.add("ag-settings-section", "ag-section-" + name);
					sections[j].setAttribute("data-ag-section", name);
					sectionIndex++;
				}
			}
			normalizeOptionGrids(map);
			clearThemeServiceDecorations(map);
			window.setTimeout(function () { normalizeOptionGrids(map); clearThemeServiceDecorations(map); }, 0);
			window.setTimeout(function () { normalizeOptionGrids(map); clearThemeServiceDecorations(map); }, 250);
			window.setTimeout(function () { normalizeOptionGrids(map); clearThemeServiceDecorations(map); }, 1000);
			if (window.MutationObserver && map.dataset.agThemeCleanupBound !== "true") {
				map.dataset.agThemeCleanupBound = "true";
				new MutationObserver(function () {
					normalizeOptionGrids(map);
					scheduleThemeCleanup(map);
				}).observe(map, { childList: true, subtree: true, attributes: true, attributeFilter: ["class"] });
			}
		}
	}
	if (document.readyState === "loading") {
		document.addEventListener("DOMContentLoaded", markPage);
	} else {
		markPage();
	}
})();

XHR.poll(3, '<%=url([[admin]], [[services]], [[AdGuardHome]], [[status]])%>', null,

		var pb = document.getElementById("AdGuardHome_redirect_badge");
		if (data && tb) {
			if (data.running) {
				tb.innerHTML = '<span class="status-running"><i class="icon-circle-fill"></i> <%:RUNNING%></span>';
				if (rb) {
					rb.className = "badge badge-success";

			} else {
				tb.innerHTML = '<span class="status-stopped"><i class="icon-circle"></i> <%:STOPPED%></span>';
				if (rb) {
					rb.className = "badge badge-danger";
					rb.textContent = "<%:Stopped%>";
				}
			}
			if (data.redirect) {
				if (pb) {
					pb.className = "badge badge-success";
					pb.textContent = "<%:Redirected%>";
				}
			} else {
				if (pb) {
					pb.className = "badge badge-secondary";
					pb.textContent = "<%:Not Redirect%>";
				}
			}
		}
	}
);
