<%+cbi/valueheader%>
<div class="ag-chpass-wrap">
	<input data-update="change"
		id="<%=cbid%>"
		name="<%=cbid%>"
		type="password"
		class="ag-chpass-input"
		value="<%=self:cfgvalue(section) or self.default%>"
		<% if self.placeholder then %>placeholder="<%=self.placeholder%>"<% end %>
		<% if self.readonly then %>readonly="readonly"<% end %>
		<% if self.maxlength then %>maxlength="<%=self.maxlength%>"<% end %>
	/>

	<div class="ag-chpass-row">
		<button type="button" class="ag-btn ag-btn-primary" id="ag-chpass-btn" onclick="return agChPass()">
			<svg class="ag-btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" focusable="false" style="width:18px;height:18px;max-width:18px;max-height:18px;flex-shrink:0"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
			<span id="ag-chpass-btn-txt"><%:Calculate Hash%></span>
		</button>
		<span class="ag-chpass-hint"><%:Enter password and click Calculate, then Save/Apply%></span>
	</div>
</div>

<style>
.ag-chpass-wrap {
	display: flex;
	flex-direction: column;
	gap: 10px;
	color: var(--ag-text-primary, #1d1d1f);
}

.ag-chpass-input {
	width: 100%;
	max-width: 420px;
	padding: 10px 14px;
	border: 1px solid var(--ag-card-border, rgba(0,0,0,.1));
	border-radius: 8px;
	font-size: 14px;
	box-sizing: border-box;
	background: var(--ag-control-bg, #fff);
	color: var(--ag-text-primary, #1d1d1f);
}

.ag-chpass-input:focus {
	outline: none;
	border-color: #007AFF;
	box-shadow: 0 0 0 3px rgba(0,122,255,.15);
}

.ag-chpass-row {
	display: flex;
	align-items: center;
	gap: 12px;
	flex-wrap: wrap;
}

.ag-chpass-wrap .ag-btn {
	display: inline-flex;
	align-items: center;
	justify-content: center;
	gap: 7px;
	padding: 10px 18px;
	border: none;
	border-radius: 8px;
	font-size: 14px;
	font-weight: 600;
	cursor: pointer;
	transition: opacity .2s, transform .15s;
	user-select: none;
}

.ag-chpass-wrap .ag-btn:hover { opacity: .92; }
.ag-chpass-wrap .ag-btn:active { transform: scale(.98); }
.ag-chpass-wrap .ag-btn:disabled { opacity: .5; cursor: not-allowed; }

.ag-chpass-wrap .ag-btn-icon {
	width: 18px !important;
	height: 18px !important;
	min-width: 18px;
	min-height: 18px;
	flex-shrink: 0;
}

.ag-chpass-wrap .ag-btn-primary {
	background: #007AFF;
	color: #fff;
	box-shadow: 0 4px 14px rgba(0,122,255,.25);
}

.ag-chpass-wrap .ag-btn-success {
	background: #34C759;
	color: #fff;
	box-shadow: 0 4px 14px rgba(52,199,89,.25);
}

.ag-chpass-hint {
	font-size: 12px;
	color: var(--ag-text-secondary, #86868b);
}
</style>

<script type="text/javascript">
//<![CDATA[
(function () {
	var btn = document.getElementById('ag-chpass-btn');
	var btnTxt = document.getElementById('ag-chpass-btn-txt');
	var inp = document.getElementById('<%=cbid%>');

	function agChPass() {
		if (!inp || !btn) return false;
		var pw = inp.value;
		if (!pw) {
			alert('<%:Please enter a password first%>');
			return false;
		}
		btn.disabled = true;
		btnTxt.textContent = '<%:Loading...%>';

		function doHash() {
			try {
				var h = TwinBcrypt.hashSync(pw);
				inp.value = h;
				btnTxt.textContent = '<%:Hash Ready - Please Save%>';
				btn.classList.remove('ag-btn-primary');
				btn.classList.add('ag-btn-success');
			} catch (e) {
				btnTxt.textContent = '<%:Hash Failed%>';
				btn.disabled = false;
			}
		}

		if (typeof TwinBcrypt !== 'undefined') {
			doHash();
		} else {
			var s = document.createElement('script');
			s.src = '<%=resource%>/twin-bcrypt.min.js';
			s.onload = function () { doHash(); btn.disabled = false; };
			s.onerror = function () { btnTxt.textContent = '<%:Load Failed%>'; btn.disabled = false; };
			document.head.appendChild(s);
		}
		return false;
	}

	window.agChPass = agChPass;
})();
//]]>
</script>
<%+cbi/valuefooter%>
