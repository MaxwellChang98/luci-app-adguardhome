<%+cbi/valueheader%>
<link rel="stylesheet" href="<%=resource%>/codemirror/lib/codemirror.css"/>
<link rel="stylesheet" href="<%=resource%>/codemirror/theme/dracula.css"/>
<link rel="stylesheet" href="<%=resource%>/codemirror/addon/fold/foldgutter.css"/>

<script src="<%=resource%>/codemirror/lib/codemirror.js"></script>
<script src="<%=resource%>/codemirror/mode/yaml/yaml.js"></script>
<script src="<%=resource%>/codemirror/addon/fold/foldcode.js"></script>
<script src="<%=resource%>/codemirror/addon/fold/foldgutter.js"></script>
<script src="<%=resource%>/codemirror/addon/fold/indent-fold.js"></script>

<div class="yaml-editor-container">
	<div class="editor-toolbar">
		<div class="editor-info">
			<svg class="yaml-ico" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true" focusable="false" style="width:18px;height:18px;max-width:18px;max-height:18px;flex-shrink:0"><path d="M8 3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2H8zm0 2h8v14H8V5zm2 2v2h4V7h-4zm0 4v2h4v-2h-4z"/></svg>
			<span><%:YAML Editor%></span>
		</div>
		<div class="editor-actions">
			<%local fs = require("nixio.fs")%>
			<%if fs.access("/tmp/AdGuardHometmpconfig.yaml") then%>
			<button type="button" id="reload_button" class="yaml-btn yaml-btn-outline" onclick="return reload_config()">
				<svg class="yaml-ico yaml-ico-sm" width="16" height="16" viewBox="0 0 24 24" aria-hidden="true" focusable="false" style="width:16px;height:16px;max-width:16px;max-height:16px;flex-shrink:0"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
				<span><%:Reload%></span>
			</button>
			<%end%>
			<button type="button" id="template_button" class="yaml-btn yaml-btn-secondary" onclick="return use_template()">
				<svg class="yaml-ico yaml-ico-sm" width="16" height="16" viewBox="0 0 24 24" aria-hidden="true" focusable="false" style="width:16px;height:16px;max-width:16px;max-height:16px;flex-shrink:0"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
				<span><%:Use Template%></span>
			</button>
		</div>
	</div>
	<div class="editor-wrapper">
		<textarea id="cbid.AdGuardHome.AdGuardHome.escconf" style="display:none"></textarea>
	</div>
</div>

<style>
/* 勿对 svg 使用 max-width:100%，在宽屏 .cbi-value 内会把图标撑满整行 */
.yaml-editor-container svg {
	box-sizing: border-box;
}

.yaml-editor-container .yaml-ico {
	width: 18px !important;
	height: 18px !important;
	min-width: 18px !important;
	min-height: 18px !important;
	max-width: 18px !important;
	max-height: 18px !important;
	display: inline-block;
	vertical-align: middle;
	flex-shrink: 0;
}

.yaml-editor-container .yaml-ico-sm {
	width: 16px !important;
	height: 16px !important;
	min-width: 16px !important;
	min-height: 16px !important;
	max-width: 16px !important;
	max-height: 16px !important;
}

.yaml-editor-container {
	display: flex;
	flex-direction: column;
	border-radius: 12px;
	overflow: hidden;
	background: #282a36;
	border: 1px solid rgba(0, 0, 0, 0.08);
}

.editor-toolbar {
	display: flex;
	align-items: center;
	justify-content: space-between;
	padding: 12px 16px;
	background: #21222c;
	border-bottom: 1px solid rgba(255, 255, 255, 0.1);
	flex-wrap: wrap;
	gap: 12px;
}

.editor-info {
	display: flex;
	align-items: center;
	gap: 8px;
	color: #f8f8f2;
	font-size: 14px;
	font-weight: 500;
}

.editor-actions {
	display: flex;
	align-items: center;
	gap: 8px;
	flex-wrap: wrap;
}

.yaml-btn {
	display: inline-flex;
	align-items: center;
	gap: 6px;
	padding: 8px 14px;
	border-radius: 8px;
	font-size: 13px;
	font-weight: 500;
	cursor: pointer;
	transition: background 0.2s ease, opacity 0.2s ease;
	border: none;
}

.yaml-btn-outline {
	background: transparent;
	border: 1px solid rgba(255, 255, 255, 0.2);
	color: #f8f8f2;
}

.yaml-btn-outline:hover {
	background: rgba(255, 255, 255, 0.1);
}

.yaml-btn-secondary {
	background: rgba(98, 114, 164, 0.35);
	color: #bd93f9;
}

.yaml-btn-secondary:hover {
	background: rgba(98, 114, 164, 0.55);
}

.editor-wrapper {
	flex: 1;
	overflow: hidden;
	min-height: 0;
}

.editor-wrapper .CodeMirror {
	height: auto;
	min-height: 480px;
	font-family: "SF Mono", Monaco, "Courier New", monospace;
	font-size: 13px;
	line-height: 1.6;
}

.editor-wrapper .CodeMirror-gutters {
	background: #21222c;
	border-right: 1px solid rgba(255, 255, 255, 0.1);
}

.editor-wrapper .CodeMirror-linenumber {
	color: #6272a4;
}

.editor-wrapper .CodeMirror-activeline-background {
	background: rgba(255, 255, 255, 0.05) !important;
}

@media (max-width: 768px) {
	.editor-toolbar {
		flex-direction: column;
		align-items: stretch;
	}
	.editor-info,
	.editor-actions {
		justify-content: center;
	}
}
</style>

<script type="text/javascript">
//<![CDATA[
(function () {
	var ta = document.getElementById("cbid.AdGuardHome.AdGuardHome.escconf");
	if (!ta) {
		return;
	}
	var editor = CodeMirror.fromTextArea(ta, {
		mode: "text/yaml",
		styleActiveLine: true,
		lineNumbers: true,
		theme: "dracula",
		lineWrapping: true,
		foldGutter: true,
		gutters: ["CodeMirror-linenumbers", "CodeMirror-foldgutter"],
		matchBrackets: true,
		indentUnit: 2,
		tabSize: 2,
		indentWithTabs: false
	});

	window.addEventListener("resize", function () {
		editor.refresh();
	});

	function reload_config() {
		XHR.get(
			"<%=url([[admin]], [[services]], [[AdGuardHome]], [[reloadconfig]])%>",
			null,
			function () {
				location.reload();
			}
		);
		return false;
	}

	function use_template() {
		XHR.get(
			"<%=url([[admin]], [[services]], [[AdGuardHome]], [[gettemplateconfig]])%>",
			null,
			function (x) {
				editor.setValue(x.responseText || "");
				editor.refresh();
			}
		);
		return false;
	}
})();
//]]>
</script>
<%+cbi/valuefooter%>
