<%+cbi/valueheader%>
<%local fs=require"nixio.fs"%>
<div class="ag-update-wrap">

	<div class="ag-update-btns">
		<button type="button" class="ag-btn ag-btn-primary" id="ag-update-btn">
			<svg class="ag-btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" focusable="false" style="width:18px;height:18px;max-width:18px;max-height:18px;flex-shrink:0"><path d="M21 10.12h-6.78l2.74-2.82c-2.73-2.7-7.15-2.8-9.88-.1-2.73 2.71-.11 7.11 2.71 9.88 2.71 2.71 7.11 2.71 9.88 0 2.71-2.71 2.71-7.11 0-9.88-.05-.05-.11-.1-.17-.14l-2.74 2.82V10.12zm-9.88 8.26c-2.71 0-5.01-2.09-5.01-4.79 0-2.71 2.3-4.79 5.01-4.79 2.71 0 5.01 2.09 5.01 4.79 0 2.71-2.3 4.79-5.01 4.79z"/></svg>
			<span id="ag-update-btn-text"><%:Check & Update%></span>
		</button>
		<button type="button" class="ag-btn ag-btn-danger" id="ag-force-btn" style="display:none">
			<svg class="ag-btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" focusable="false" style="width:18px;height:18px;max-width:18px;max-height:18px;flex-shrink:0"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
			<span><%:Force Update%></span>
		</button>
		<%if self.showfastconfig then%>
		<button type="button" class="ag-btn ag-btn-outline" onclick="location.href='<%=url([[admin]], [[services]], [[AdGuardHome]], [[manual]])%>'">
			<svg class="ag-btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" focusable="false" style="width:18px;height:18px;max-width:18px;max-height:18px;flex-shrink:0"><path d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
			<span><%:Fast Config%></span>
		</button>
		<%end%>
	</div>

	<div class="ag-toast" id="ag-toast" style="display:none">
		<span id="ag-toast-msg"></span>
	</div>

	<div id="ag-log-wrap" style="display:none" class="ag-log-wrap">
		<div class="ag-log-toolbar">
			<span class="ag-log-title"><%:Update Log%></span>
			<label class="ag-log-opt">
				<input type="checkbox" id="ag-rev" checked onclick="agToggleRev()">
				<span><%:Reverse%></span>
			</label>
		</div>
		<textarea id="ag-log-ta" class="ag-log-ta" rows="10" readonly></textarea>
	</div>

</div>

<style>
.ag-update-wrap {
	display: flex;
	flex-direction: column;
	gap: 12px;
	color: var(--ag-text-primary, #1d1d1f);
}

.ag-update-btns {
	display: flex;
	flex-wrap: wrap;
	gap: 8px;
}

.ag-update-wrap .ag-btn {
	display: inline-flex;
	align-items: center;
	justify-content: center;
	gap: 8px;
	padding: 10px 20px;
	border: none;
	border-radius: 8px;
	font-size: 14px;
	font-weight: 600;
	cursor: pointer;
	transition: opacity .2s, transform .15s, box-shadow .2s;
	user-select: none;
	white-space: nowrap;
}

.ag-update-wrap .ag-btn:hover { opacity: .92; }
.ag-update-wrap .ag-btn:active { transform: scale(.98); }
.ag-update-wrap .ag-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

.ag-update-wrap .ag-btn-icon {
	width: 18px !important;
	height: 18px !important;
	min-width: 18px;
	min-height: 18px;
	flex-shrink: 0;
}

.ag-update-wrap .ag-btn-primary {
	background: #34C759;
	color: #fff;
	box-shadow: 0 4px 14px rgba(52, 199, 89, .25);
}
.ag-update-wrap .ag-btn-primary:hover { box-shadow: 0 6px 18px rgba(52, 199, 89, .32); }

.ag-update-wrap .ag-btn-danger {
	background: #FF3B30;
	color: #fff;
	box-shadow: 0 4px 14px rgba(255, 59, 48, .25);
}

.ag-update-wrap .ag-btn-outline {
	background: var(--ag-control-bg, transparent);
	border: 1px solid var(--ag-card-border, rgba(0,0,0,.15));
	color: var(--ag-text-primary, #1d1d1f);
	box-shadow: none;
}

/* Toast */
.ag-toast {
	padding: 10px 16px;
	border-radius: 8px;
	font-size: 13px;
	font-weight: 500;
	text-align: center;
	animation: agFadeIn .25s ease;
}

.ag-toast.ag-toast-info {
	background: rgba(0, 122, 255, .1);
	color: #007AFF;
	border: 1px solid rgba(0, 122, 255, .2);
}

.ag-toast.ag-toast-err {
	background: rgba(255, 59, 48, .1);
	color: #FF3B30;
	border: 1px solid rgba(255, 59, 48, .2);
}

.ag-toast.ag-toast-ok {
	background: rgba(52, 199, 89, .1);
	color: #34C759;
	border: 1px solid rgba(52, 199, 89, .2);
}

@keyframes agFadeIn {
	from { opacity: 0; transform: translateY(-6px); }
	to   { opacity: 1; transform: translateY(0); }
}

/* Log */
.ag-log-wrap {
	border: 1px solid var(--ag-card-border, rgba(0,0,0,.08));
	border-radius: 8px;
	overflow: hidden;
}

.ag-log-toolbar {
	display: flex;
	align-items: center;
	justify-content: space-between;
	padding: 10px 14px;
	background: var(--ag-control-bg, rgba(0,0,0,.03));
	border-bottom: 1px solid var(--ag-row-border, rgba(0,0,0,.06));
}

.ag-log-title {
	font-size: 12px;
	font-weight: 600;
	color: var(--ag-text-secondary, #86868b);
}

.ag-log-opt {
	display: flex;
	align-items: center;
	gap: 5px;
	font-size: 12px;
	color: var(--ag-text-secondary, #86868b);
	cursor: pointer;
}

.ag-log-opt input { accent-color: #007AFF; }

.ag-log-ta {
	display: block;
	width: 100%;
	box-sizing: border-box;
	border: none;
	background: var(--ag-control-bg, transparent);
	font-family: 'SF Mono', Monaco, 'Courier New', monospace;
	font-size: 12px;
	line-height: 1.6;
	color: var(--ag-text-primary, #1d1d1f);
	padding: 12px 14px;
	resize: vertical;
	outline: none;
}

.ag-log-ta::-webkit-scrollbar { width: 6px; }
.ag-log-ta::-webkit-scrollbar-thumb {
	background: rgba(0,0,0,.15);
	border-radius: 3px;
}
</style>

<script type="text/javascript">
//<![CDATA[
(function () {
	var updBtn  = document.getElementById('ag-update-btn');
	var forceBtn = document.getElementById('ag-force-btn');
	var btnTxt  = document.getElementById('ag-update-btn-text');
	var logWrap = document.getElementById('ag-log-wrap');
	var logTa   = document.getElementById('ag-log-ta');
	var toast    = document.getElementById('ag-toast');
	var toastMsg = document.getElementById('ag-toast-msg');
	var isRev   = true;
	var pollTimer = null;

	function showToast(msg, type) {
		if (!toast) return;
		toastMsg.textContent = msg;
		toast.className = 'ag-toast ag-toast-' + type;
		toast.style.display = 'block';
		if (type !== 'info') {
			setTimeout(function () { toast.style.display = 'none'; }, 4500);
		}
	}

	function startUpdate(force) {
		if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }

		XHR.get('<%=url([[admin]], [[services]], [[AdGuardHome]], [[doupdate]])%>', force ? { force: 1 } : null, function () {});

		updBtn.disabled = true;
		forceBtn.disabled = true;
		btnTxt.textContent = '<%:Checking...%>';
		if (force) { forceBtn.disabled = true; }

		showToast('<%:Checking...%>', 'info');

		if (logWrap) logWrap.style.display = 'block';
		if (logTa)   logTa.value = '';

		pollTimer = setInterval(function () {
			XHR.get('<%=url([[admin]], [[services]], [[AdGuardHome]], [[check]])%>', null, function (x) {
				if (!x || !x.responseText) return;
				var txt = x.responseText;
				if (txt.charCodeAt(0) === 0) {
					clearInterval(pollTimer);
					pollTimer = null;
					var doneMsg = '<%:Updated%>';
					updBtn.disabled = false;
					btnTxt.textContent = doneMsg;
					showToast(doneMsg, 'ok');
					forceBtn.style.display = 'none';
					btnTxt.textContent = '<%:Check & Update%>';
					updBtn.disabled = false;
					setTimeout(function () { window.location.reload(); }, 2500);
					return;
				}
				if (logTa) {
					if (isRev) {
						logTa.value = txt + (logTa.value ? '\n' + logTa.value : '');
					} else {
						logTa.value += txt;
						logTa.scrollTop = logTa.scrollHeight;
					}
				}
			});
		}, 2500);
	}

	window.agToggleRev = function () {
		isRev = !isRev;
		if (logTa) {
			var lines = logTa.value.split('\n').filter(function (l) { return l.length > 0; });
			logTa.value = isRev ? lines.reverse().join('\n') : lines.reverse().reverse().join('\n');
		}
	};

	if (updBtn)   updBtn.addEventListener('click',   function () { startUpdate(false); });
	if (forceBtn) forceBtn.addEventListener('click', function () { startUpdate(true);  });

	<%if fs.access("/var/run/update_core") then%>
		updBtn.disabled = true;
		forceBtn.style.display = 'inline-flex';
		showToast('<%:Checking...%>', 'info');
		startUpdate(false);
	<%elseif fs.access("/var/run/update_core_error") then%>
		showToast('<%:Check Error%>', 'err');
		logWrap.style.display = 'block';
	<%end%>
})();
//]]>
</script>
<%+cbi/valuefooter%>
