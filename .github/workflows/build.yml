name: Build OpenWrt LuCI IPK

# 触发条件：当代码推送到 main 分支，或者你手动点击运行
on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  # 🔗 【重要】修改为你路由器固件对应的 SDK 下载地址
  SDK_URL: https://downloads.openwrt.org/releases/24.10.7/targets/armsr/armv8/openwrt-sdk-24.10.7-armsr-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.zst
  # 📦 【重要】修改为你的 LuCI 文件夹名称（必须和 Makefile 里的包名一致）
  PKG_NAME: luci-app-adguardhome

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 拉取你仓库里的 LuCI 源码
    - name: Checkout Source Code
      uses: actions/checkout@v4
      with:
        path: ${{ env.PKG_NAME }}

    # 2. 补齐云服务器的编译依赖环境
    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-setuptools rsync swig unzip zlib1g-dev file wget

    # 3. 下载并解压对应的 OpenWrt SDK
    - name: Download and Unpack SDK
      run: |
        wget -qO sdk.tar.xz ${{ env.SDK_URL }}
        mkdir sdk
        tar -xvf sdk.tar.xz -C sdk --strip-components=1

    # 4. 把你的 LuCI 插件源码移入 SDK 的 package 目录
    - name: Move Package into SDK
      run: |
        mv ${{ env.PKG_NAME }} sdk/package/

    # 5. 更新 SDK 核心依赖包
    - name: Update and Install Feeds
      run: |
        cd sdk
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    # 6. 配置编译选项并开始打包
    - name: Compile LuCI Package
      run: |
        cd sdk
        # 强制将你的插件勾选为编译模块 (m)
        echo "CONFIG_PACKAGE_${{ env.PKG_NAME }}=m" >> .config
        make defconfig
        # 仅编译你的插件，V=s 开启日志输出
        make package/${{ env.PKG_NAME }}/compile V=s

    # 7. 将打包出来的 .ipk 成品上传到 GitHub 供你下载
    - name: Upload IPK Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.PKG_NAME }}-ipk-packages
        path: sdk/bin/**/*.ipk
